<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mabel — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --border: #e8e8e4;
      --border-strong: #c8c8c2;
      --text: #1a1a18;
      --text-2: #4a4a46;
      --text-3: #9a9a94;
      --green: #3d8c6e;
      --green-bg: #eef7f3;
      --green-border: #c4e2d6;
      --red: #c0392b;
      --red-bg: #fef0ee;
      --red-border: #f5c6c0;
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top))
               max(24px, env(safe-area-inset-right))
               max(24px, env(safe-area-inset-bottom))
               max(24px, env(safe-area-inset-left));
    }
    @media (min-height: 600px) {
      body { align-items: center; }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    .auth-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.38s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 4px 32px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);
    }

    .auth-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .auth-title .gray { color: var(--text-3); font-style: italic; }

    .auth-sub {
      font-size: 14px;
      color: var(--text-3);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 7px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-family: var(--font);
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    .form-input::placeholder { color: var(--text-3); }
    .form-input:focus {
      border-color: var(--border-strong);
      box-shadow: 0 0 0 3px rgba(26,26,24,.05);
      background: white;
    }

    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-3); display: grid; place-items: center;
      padding: 8px; border-radius: 4px; transition: color 0.12s;
      min-width: 44px; min-height: 44px;
    }
    .pw-toggle:hover { color: var(--text-2); }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      margin-top: 4px;
    }
    .form-check {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-2); cursor: pointer;
      user-select: none;
    }
    .form-check input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--text);
      cursor: pointer; flex-shrink: 0;
    }
    .form-forgot {
      font-size: 13px; color: var(--text-3);
      text-decoration: none; transition: color 0.12s;
    }
    .form-forgot:hover { color: var(--text-2); }

    .form-error {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 18px;
      animation: fadeUp 0.2s ease;
    }
    .form-error.visible { display: flex; }

    .btn-primary {
      width: 100%;
      background: var(--text);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.87; }
    .btn-primary:active:not(:disabled) { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .btn-spinner { display: block; }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13.5px;
      color: var(--text-3);
    }
    .auth-footer a {
      color: var(--text-2); font-weight: 600;
      text-decoration: none;
    }
    .auth-footer a:hover { color: var(--text); }

    @media (max-width: 600px) {
      .auth-card { padding: 24px 18px; border-radius: 14px; }
      .auth-title { font-size: 24px; }
      .auth-wrap { padding-top: 16px; padding-bottom: 16px; }
      .form-row { flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1 class="auth-title">Welcome <span class="gray">back.</span></h1>
      <p class="auth-sub">Sign in to continue learning with your documents.</p>

      <div class="form-error" id="form-error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text">Invalid email or password.</span>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="vvd@gmail.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-row">
          <label class="form-check">
            <input type="checkbox" id="remember" />
            Remember me
          </label>
          <a href="#" class="form-forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-text">Sign in</span>
          <div class="btn-spinner"></div>
        </button>
      </form>

    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/auth/register.html">Create one</a>
    </div>
  </div>

  <script>
    // Password toggle
    const pwToggle = document.getElementById('pw-toggle');
    const pwInput  = document.getElementById('password');
    const eyeIcon  = document.getElementById('eye-icon');
    let visible = false;
    pwToggle.addEventListener('click', () => {
      visible = !visible;
      pwInput.type = visible ? 'text' : 'password';
      eyeIcon.innerHTML = visible
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    // Form submit
    const form      = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorBox  = document.getElementById('form-error');
    const errorText = document.getElementById('error-text');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorBox.classList.remove('visible');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorText.textContent = 'Please fill in all fields.';
        errorBox.classList.add('visible');
        return;
      }
      if (!email.includes('@')) {
        errorText.textContent = 'Please enter a valid email address.';
        errorBox.classList.add('visible');
        return;
      }

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const res = await fetch('http://localhost:8000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorText.textContent = data.detail || 'Invalid email or password.';
          errorBox.classList.add('visible');
          return;
        }

        // store token and user info
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user_id', data.user_id);
        localStorage.setItem('first_name', data.first_name);
        localStorage.setItem('email', data.email);

        window.location.href = '/views/chat.html';

      } catch (err) {
        errorText.textContent = 'Could not connect to server. Try again.';
        errorBox.classList.add('visible');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
