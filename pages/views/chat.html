<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mabel — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="nav.css">
  <style>
    .fc-inner, .msg, .dot, .progress-fill { transition: none !important; }
    .fc-inner { transition: transform 0.4s cubic-bezier(.4,0,.2,1) !important; }
    .progress-fill { transition: width 0.3s ease !important; }

    #panel-chat {
      display: flex; flex-direction: column; flex: 1;
      min-height: 0; overflow: hidden; position: relative;
    }
    #panel-chat::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + 28px);
      background: linear-gradient(to bottom, var(--bg) 0%, var(--bg) 40%, rgba(247,247,245,0) 100%);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      pointer-events: none; z-index: 10; transition: background 0.2s ease;
    }
    body.dark #panel-chat::before {
      background: linear-gradient(to bottom, #0a0a0a 0%, #0a0a0a 40%, rgba(10,10,10,0) 100%);
    }
    #panel-chat::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 340px;
      background: linear-gradient(to top, var(--bg) 0%, var(--bg) 55%, rgba(247,247,245,0) 100%);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      -webkit-mask-image: linear-gradient(to top, black 60%, transparent 100%);
      mask-image: linear-gradient(to top, black 60%, transparent 100%);
      pointer-events: none; z-index: 2; transition: background 0.2s ease;
    }
    body.dark #panel-chat::after {
      background: linear-gradient(to top, #0a0a0a 0%, #0a0a0a 55%, rgba(10,10,10,0) 100%);
    }
    .mabel-dock-fixed { position: relative; z-index: 3; }

    /* ────────────────────────────────────────────────
       SIDEBAR HISTORY STYLES
    ──────────────────────────────────────────────── */
    /* overflow:hidden prevents text bleeding out during sidebar collapse animation */
    .history-section { padding: 0 8px 12px; overflow: hidden; }

    .history-new-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 8px 10px; margin-bottom: 6px;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
      font-family: var(--font); font-size: 12px; font-weight: 600;
      color: var(--text-2); transition: all .15s; text-align: left;
    }
    .history-new-btn:hover {
      background: var(--green-bg); border-color: var(--green-border); color: var(--green);
    }
    body.dark .history-new-btn { border-color: #2a2a2a; }
    body.dark .history-new-btn:hover { background: rgba(72,187,120,.08); border-color: rgba(72,187,120,.3); }

    .history-list { display: flex; flex-direction: column; gap: 1px; }

    .history-empty {
      font-size: 12px; color: var(--text-3); font-style: italic;
      padding: 4px 10px 8px; line-height: 1.5;
    }

    .history-item {
      display: flex; align-items: center;
      border-radius: 8px; cursor: pointer; transition: background .12s;
      position: relative;
    }
    .history-item:hover { background: var(--surface); }
    .history-item.active { background: var(--surface); }
    body.dark .history-item:hover,
    body.dark .history-item.active { background: #1a1a1a; }

    .history-item-body { flex: 1; min-width: 0; padding: 8px 10px; }
    .history-item-title {
      font-size: 12.5px; font-weight: 500; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.4;
    }
    .history-item.active .history-item-title { font-weight: 600; }
    .history-item-meta {
      font-size: 10.5px; color: var(--text-3); margin-top: 2px;
      font-family: var(--mono);
    }

    .history-item-del {
      flex-shrink: 0; width: 28px; height: 28px; margin-right: 4px;
      background: none; border: none; cursor: pointer;
      color: var(--text-3); border-radius: 6px;
      display: grid; place-items: center;
      opacity: 0; transition: opacity .12s, color .12s, background .12s;
    }
    .history-item:hover .history-item-del { opacity: 1; }
    .history-item-del:hover { color: #e55; background: rgba(220,50,50,.08); }
    body.dark .history-item-del:hover { color: #ff6b6b; background: rgba(255,80,80,.1); }
    .history-item.deleting { opacity: 0.4; pointer-events: none; }

    /* Shimmer skeleton while loading */
    .history-skeleton { display: flex; flex-direction: column; gap: 3px; padding: 0 2px; }
    .history-skel-item {
      height: 44px; border-radius: 8px;
      background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Chat body ── */
    .chat-body {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: calc(var(--nav-h) + 16px) 24px 16px;
      display: flex; flex-direction: column; gap: 10px;
      align-items: center; min-height: 0; position: relative;
    }
    .chat-body > * { width: 100%; max-width: 680px; }
    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Hero */
    .chat-hero {
      position: absolute; top: 0; left: 0; right: 0; bottom: 210px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; gap: 16px;
      padding: 32px; pointer-events: none; transition: opacity 0.35s ease; z-index: 0;
    }
    .chat-hero.hidden { opacity: 0; pointer-events: none; }
    .mabel-hero-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(32px, 6vw, 62px); font-weight: 700;
      color: var(--text); line-height: 1.2; letter-spacing: -0.01em; margin: 0;
    }
    .mabel-hero-title .gray { color: var(--text-3); font-style: italic; display: block; }
    .mabel-hero-sub {
      font-size: clamp(14px, 1.4vw, 17px); color: var(--text-3);
      line-height: 1.75; width: min(720px, 72%);
    }
    .mabel-hero-sub strong { color: var(--text-2); font-weight: 500; }

    /* Dock */
    .mabel-dock-fixed {
      flex-shrink: 0; padding: 8px 20px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .mabel-dock-fixed > * { width: 100%; max-width: 680px; }

    /* Messages */
    .msg { display: flex; gap: 0; max-width: 580px; animation: slideUp 0.18s ease; width: auto !important; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .msg.restored { animation: none; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
    .msg-bubble { padding: 11px 15px; border-radius: 10px; font-size: 14.5px; line-height: 1.65; border: 1px solid; }
    .msg.user .msg-bubble { background: var(--text); color: white; border-color: var(--text); border-bottom-right-radius: 3px; }
    .msg.assistant .msg-bubble { background: var(--surface); border-color: var(--border); border-bottom-left-radius: 3px; }
    body.dark .msg.user .msg-bubble { background: #f0f0ee; color: #0a0a0a; border-color: #f0f0ee; }

    /* File card */
    .msg-file-row {
      display: flex; flex-direction: column; gap: 6px;
      align-self: flex-end; max-width: 580px; width: auto !important;
      animation: slideUp 0.18s ease;
    }
    .msg-file-card {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; border-bottom-right-radius: 3px; max-width: 300px;
    }
    .msg-file-icon {
      width: 34px; height: 34px; background: var(--green-bg);
      border: 1px solid var(--green-border); border-radius: 8px;
      display: grid; place-items: center; flex-shrink: 0; color: var(--green);
    }
    .msg-file-name { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .msg-file-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

    /* Source cards */
    .msg-sources { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,.08); display: flex; flex-direction: column; gap: 6px; }
    body.dark .msg-sources { border-top-color: rgba(255,255,255,.08); }
    .msg-source-card { background: var(--bg); border-left: 2px solid var(--green-border); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 8px 12px; }
    .msg-source-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .msg-source-tag { font-size: 10px; font-weight: 700; color: var(--green); font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase; }
    .msg-source-score { font-size: 10px; font-weight: 500; color: var(--text-3); font-family: var(--mono); }
    .msg-source-filename { font-size: 11.5px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msg-source-text { font-size: 12px; color: var(--text-3); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    /* Inline citation highlights e.g. [Source 1] */
    .cite-ref { display: inline-flex; align-items: center; background: transparent; border: 1px solid var(--green); color: var(--green); border-radius: 3px; padding: 0px 4px; font-size: 10px; font-weight: 600; font-family: var(--mono); vertical-align: middle; white-space: nowrap; line-height: 1.5; }
    /* Input box */
    .mabel-input-box {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 14px 10px;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,.05); transition: box-shadow 0.2s ease;
      position: relative;
    }
    .mabel-input-box:focus-within { box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    body.dark .mabel-input-box { background: #181818; border-color: #2a2a2a; box-shadow: 0 8px 40px rgba(0,0,0,.5); }

    .mabel-badge-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; row-gap: 6px; }
    .mabel-doc-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--green-bg); border: 1px solid var(--green-border); border-radius: 20px; padding: 4px 8px; font-size: 11px; font-weight: 500; color: var(--green); font-family: var(--mono); max-width: 200px; }
    .mabel-doc-tag span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mabel-doc-tag button { background: none; border: none; cursor: pointer; color: var(--green); display: grid; place-items: center; padding: 0; flex-shrink: 0; opacity: .7; }
    .mabel-doc-tag button:hover { opacity: 1; }

    .mabel-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px 5px 9px; font-size: 12px; font-weight: 600; color: var(--text-2); cursor: default; font-family: var(--mono); letter-spacing: .02em; white-space: nowrap; user-select: none; }
    body.dark .mabel-badge { background: #1e1e1e; border-color: #333; }

    .mabel-ta {
      background: transparent !important; border: none !important; outline: none !important;
      resize: none !important; font-family: var(--font) !important; font-size: 14px !important;
      color: var(--text) !important; min-height: 28px !important; max-height: 180px !important;
      padding: 0 2px !important; line-height: 1.6 !important; width: 100%; -webkit-appearance: none;
    }
    .mabel-ta::placeholder { color: var(--text-3) !important; font-style: italic; }

    .mabel-input-footer { display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); padding-top: 10px; }

    .attach-wrap { position: relative; flex-shrink: 0; }
    .mabel-attach {
      height: 44px; min-width: 44px; padding: 0 12px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-3); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; transition: all .12s; white-space: nowrap;
    }
    .mabel-attach:hover { border-color: var(--border-strong); color: var(--text); }
    .mabel-attach.has-docs { border-color: var(--green-border); color: var(--green); background: var(--green-bg); }
    .attach-count {
      font-size: 11px; font-weight: 700; font-family: var(--mono);
      display: none; line-height: 1;
    }
    .attach-count.visible { display: inline; }
    /* keep the old class name so JS still targets it, but it's invisible now */
    .attach-badge { display: none !important; }

    .send-btn {
      width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--text);
      border: none; color: white; cursor: pointer; display: grid; place-items: center;
      flex-shrink: 0; transition: opacity .15s; margin-left: auto;
    }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { opacity: .85; }
    body.dark .send-btn { background: #f0f0ee; color: #0a0a0a; }

    /* Doc picker */
    .doc-picker {
      position: absolute; bottom: calc(100% + 10px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      opacity: 0; transform: translateY(8px); pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease; z-index: 20;
    }
    .doc-picker.open { opacity: 1; transform: translateY(0); pointer-events: all; }
    body.dark .doc-picker { background: #1a1a1a; border-color: #2a2a2a; box-shadow: 0 8px 40px rgba(0,0,0,.5); }

    .doc-picker-header { padding: 12px 16px 8px; font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; font-family: var(--mono); }
    .doc-picker-list { max-height: 220px; overflow-y: auto; }
    .doc-picker-list::-webkit-scrollbar { width: 3px; }
    .doc-picker-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .doc-picker-empty { padding: 20px 16px; text-align: center; font-size: 13px; color: var(--text-3); font-style: italic; }

    .doc-picker-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; transition: background .1s; border-bottom: 1px solid var(--border); }
    .doc-picker-item:last-child { border-bottom: none; }
    .doc-picker-item:hover { background: var(--bg); }
    .doc-picker-item.active { background: var(--green-bg); }
    body.dark .doc-picker-item:hover { background: #222; }
    body.dark .doc-picker-item.active { background: rgba(72,187,120,.08); }
    body.dark .doc-picker-item { border-bottom-color: #2a2a2a; }

    .picker-check { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid var(--border); flex-shrink: 0; display: grid; place-items: center; background: var(--surface); transition: all .12s; }
    .doc-picker-item.active .picker-check { background: var(--green); border-color: var(--green); }
    .picker-check svg { display: none; }
    .doc-picker-item.active .picker-check svg { display: block; }
    .picker-file-icon { color: var(--text-3); flex-shrink: 0; }
    .doc-picker-item.active .picker-file-icon { color: var(--green); }
    .picker-info { flex: 1; min-width: 0; }
    .picker-name { font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .doc-picker-item.active .picker-name { color: var(--green); font-weight: 600; }

    .picker-delete-btn { flex-shrink: 0; width: 28px; height: 28px; background: none; border: none; cursor: pointer; color: var(--text-3); border-radius: 6px; display: grid; place-items: center; opacity: 0; transition: opacity .12s, color .12s, background .12s; }
    .doc-picker-item:hover .picker-delete-btn { opacity: 1; }
    .picker-delete-btn:hover { color: #e55; background: rgba(220,50,50,.08); }
    body.dark .picker-delete-btn:hover { color: #ff6b6b; background: rgba(255,80,80,.1); }
    .doc-picker-item.deleting { opacity: 0.4; pointer-events: none; }

    .doc-picker-footer { border-top: 1px solid var(--border); padding: 0; }
    body.dark .doc-picker-footer { border-top-color: #2a2a2a; }
    .picker-upload-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 16px; background: none; border: none; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--text-2); transition: background .1s; text-align: center; }
    .picker-upload-btn:hover { background: var(--bg); color: var(--text); }
    body.dark .picker-upload-btn:hover { background: #222; }
    .picker-upload-icon { width: 22px; height: 22px; border-radius: 5px; background: var(--border); display: grid; place-items: center; flex-shrink: 0; color: var(--text-2); }

    /* Chips */
    .mabel-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
    .mabel-chip { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; min-height: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; transition: all .15s; white-space: nowrap; }
    .mabel-chip:hover { border-color: var(--border-strong); color: var(--text); background: var(--bg); transform: translateY(-1px); }
    body.dark .mabel-chip { background: #181818; border-color: #2a2a2a; }
    body.dark .mabel-chip:hover { background: #222; border-color: #3a3a3a; }
    .mabel-chip svg { opacity: .5; flex-shrink: 0; }
    .mabel-chip:hover svg { opacity: 1; }

    /* Loading dots */
    .dots { display: flex; gap: 4px; padding: 2px 0; }
    .dot-sm { width: 5px; height: 5px; background: var(--text-3); border-radius: 50%; animation: blink 1.1s infinite; }
    .dot-sm:nth-child(2){animation-delay:.18s} .dot-sm:nth-child(3){animation-delay:.36s}
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* Upload status */
    .upload-status { display: none; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; color: var(--green); font-family: var(--mono); margin-left: auto; padding-right: 4px; }
    .upload-status.visible { display: flex; }
    .upload-spinner { width: 12px; height: 12px; border: 1.5px solid var(--green-border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      *, *::before, *::after { box-sizing: border-box; }
      html, body { overflow-x: hidden; max-width: 100vw; }
      .mabel-hero-sub { width: 90%; }
      .chat-body { padding: calc(var(--nav-h) + 12px) 12px 12px; }
      .msg { max-width: 92%; }
      .msg-bubble { font-size: 14px; padding: 10px 13px; word-break: break-word; }
      .mabel-dock-fixed { padding: 8px 12px; padding-bottom: max(16px, env(safe-area-inset-bottom)); width: 100%; }
      .mabel-dock-fixed > * { max-width: 100%; }
      .mabel-input-box { border-radius: 12px; padding: 10px 12px 8px; width: 100%; }
      .mabel-input-footer { flex-wrap: wrap; gap: 6px; }
      .mabel-chips { gap: 6px; }
      .mabel-chip { font-size: 12px; padding: 8px 12px; }
      .mabel-attach { min-width: 44px; padding: 0 10px; }
      .send-btn { width: 44px; height: 44px; }
      .mabel-badge { font-size: 11px; padding: 4px 8px; }
      .msg-file-row { max-width: 92%; }
      .msg-file-card { max-width: 100%; }
      .doc-picker { left: 0; right: 0; }
      .doc-picker-list { max-height: 160px; }
    }
  </style>
</head>
<body>
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = '../auth/login.html';
    }
  </script>

  <script>NAV_ACTIVE = 'chat';</script>
  <script src="nav.js"></script>

  <div class="layout">
    <main class="main">
      <div id="panel-chat">
        <div id="chat-hero" class="chat-hero">
          <h1 class="mabel-hero-title">What do you want to<span class="gray">learn?</span></h1>
          <p class="mabel-hero-sub">
            <strong>Upload any document</strong> — lecture notes, research papers, textbooks —
            and MABEL will answer questions, summarize, generate flashcards, and quiz you.
          </p>
        </div>

        <div class="chat-body" id="chat-msgs"></div>

        <div class="mabel-dock-fixed">
          <div class="mabel-input-box" style="width:100%">

            <div class="doc-picker" id="doc-picker">
              <div class="doc-picker-header">Your Documents</div>
              <div class="doc-picker-list" id="doc-picker-list">
                <div class="doc-picker-empty" id="doc-picker-empty">No documents yet.</div>
              </div>
              <div class="doc-picker-footer">
                <button class="picker-upload-btn" onclick="triggerUpload()">
                  <div class="picker-upload-icon">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </div>
                  Upload a new document
                </button>
              </div>
            </div>

            <div class="mabel-badge-row" id="mabel-badge-row"></div>
            <textarea id="chat-ta" class="mabel-ta" placeholder="Ask a question, or upload a document to get started…" rows="1"></textarea>
            <div class="mabel-input-footer">
              <input type="file" id="file-in" accept=".txt,.pdf,.docx" multiple style="display:none"/>

              <div class="attach-wrap">
                <button id="plus-btn" class="mabel-attach" title="Documents" onclick="togglePicker(event)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  <span class="attach-count" id="attach-badge"></span>
                </button>
              </div>

              <div class="mabel-badge"><span>pdf, docx, txt</span></div>
              <div class="mabel-badge">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke:#e8825a"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <span>MABEL 1.0</span>
              </div>

              <div class="upload-status" id="upload-status">
                <div class="upload-spinner"></div>
                <span id="upload-status-text">Uploading…</span>
              </div>

              <button class="send-btn" id="send-btn" disabled>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>

          <div class="mabel-chips">
            <button class="mabel-chip" onclick="location.href='summarize.html'">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>
              Summarize
            </button>
            <button class="mabel-chip" onclick="location.href='flashcards.html'">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
              Flashcards
            </button>
            <button class="mabel-chip" onclick="location.href='quiz.html'">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              Quiz
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Word cycler -->
  <script>
    (function () {
      const WORDS = ['learn?','study?','innovate?','discover?','research?','explore?','achieve?'];
      const INTERVAL = 3000, FADE = 250;
      const el = document.querySelector('.mabel-hero-title .gray');
      if (el) {
        el.style.transition = `opacity ${FADE}ms ease, transform ${FADE}ms ease`;
        let i = 0;
        setInterval(() => {
          i = (i + 1) % WORDS.length;
          el.style.opacity = '0'; el.style.transform = 'translateY(-6px)';
          setTimeout(() => {
            el.textContent = WORDS[i];
            el.style.transition = 'none'; el.style.transform = 'translateY(6px)';
            el.offsetHeight;
            el.style.transition = `opacity ${FADE}ms ease, transform ${FADE}ms ease`;
            el.style.opacity = '1'; el.style.transform = 'translateY(0)';
          }, FADE);
        }, INTERVAL);
      }
    })();
  </script>

  <script>
    const token = localStorage.getItem('token');
    const BASE   = 'http://localhost:8000';

    // ── State ──────────────────────────────────────────────────────
    let uploadedDocs    = [];
    let libraryDocs     = [];
    let activeDocs      = new Set();
    let uploadingCount  = 0;
    let pickerOpen      = false;
    let chatStarted     = false;
    let conversationId  = null;
    let activeHistoryId = null;

    // ────────────────────────────────────────────────────────────────
    //  HISTORY SIDEBAR — upgrade the pre-rendered #history-section
    //  that nav.js already injected. We just replace its contents
    //  with the interactive version (real New chat button + list).
    // ────────────────────────────────────────────────────────────────
    function injectHistorySection() {
      // nav.js always renders #history-section — find and upgrade it
      const section = document.getElementById('history-section');
      if (!section) return;

      section.className = 'history-section';
      section.innerHTML = `
        <button class="history-new-btn nav-text" onclick="startNewChat()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New chat
        </button>
        <div class="history-list nav-text" id="history-list"></div>`;
    }

    // ── Relative timestamp ─────────────────────────────────────────
    function relativeTime(ts) {
      if (!ts) return '';
      const diff = Date.now() / 1000 - ts;
      if (diff < 60)         return 'just now';
      if (diff < 3600)       return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400)      return Math.floor(diff / 3600) + 'h ago';
      if (diff < 86400 * 7)  return Math.floor(diff / 86400) + 'd ago';
      return new Date(ts * 1000).toLocaleDateString();
    }

    // ── Load history list from API ─────────────────────────────────
    async function loadHistory() {
      try {
        const res = await fetch(`${BASE}/api/conversations/`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) { window.location.href = '../auth/login.html'; return; }
        const data = res.ok ? await res.json() : { conversations: [] };
        renderHistoryList(data.conversations || []);
      } catch (err) {
        console.error('Failed to load history:', err);
        renderHistoryList([]);
      }
    }

    function renderHistoryList(conversations) {
      const list = document.getElementById('history-list');
      if (!list) return;

      // Always clear skeleton on first real render
      const skeleton = list.querySelector('.history-skeleton');
      if (skeleton) skeleton.remove();

      // ── Diff update — never wipe the whole list, prevents sidebar flicker ──
      // Build a map of what we want
      const wanted = new Map(conversations.map(c => [c.conversation_id, c]));

      // Remove items no longer in the list
      list.querySelectorAll('.history-item[data-cid]').forEach(el => {
        if (!wanted.has(el.dataset.cid)) {
          el.style.transition = 'opacity .15s';
          el.style.opacity = '0';
          setTimeout(() => el.remove(), 150);
        }
      });

      // Show empty state if needed
      let emptyEl = list.querySelector('.history-empty');
      if (!conversations.length) {
        if (!emptyEl) {
          emptyEl = document.createElement('div');
          emptyEl.className = 'history-empty';
          emptyEl.textContent = 'No sessions yet.';
          list.appendChild(emptyEl);
        }
        return;
      }
      if (emptyEl) emptyEl.remove();

      // Add or update items
      conversations.forEach((conv, idx) => {
        const isActive = conv.conversation_id === activeHistoryId;
        let item = list.querySelector(`.history-item[data-cid="${CSS.escape(conv.conversation_id)}"]`);

        if (!item) {
          // New item — build and insert at the right position
          item = document.createElement('div');
          item.dataset.cid = conv.conversation_id;
          item.innerHTML = `
            <div class="history-item-body">
              <div class="history-item-title"></div>
              <div class="history-item-meta"></div>
            </div>
            <button class="history-item-del" title="Delete session"
              onclick="deleteSession(event, '${esc(conv.conversation_id)}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/>
              </svg>
            </button>`;
          item.addEventListener('click', e => {
            if (!e.target.closest('.history-item-del')) loadSession(conv.conversation_id);
          });

          // Insert at correct position
          const existingItems = list.querySelectorAll('.history-item[data-cid]');
          if (idx < existingItems.length) {
            list.insertBefore(item, existingItems[idx]);
          } else {
            list.appendChild(item);
          }
        }

        // Always update text content in-place (no DOM removal = no flicker)
        item.className = 'history-item' + (isActive ? ' active' : '');
        item.querySelector('.history-item-title').textContent = conv.title;
        item.querySelector('.history-item-meta').textContent =
          conv.turn_count + ' turn' + (conv.turn_count !== 1 ? 's' : '') + ' · ' + relativeTime(conv.last_updated);
      });
    }

    // ── Load a past session into the chat view ─────────────────────
    async function loadSession(cid) {
      if (cid === activeHistoryId) return;

      // Highlight in sidebar
      document.querySelectorAll('.history-item').forEach(el => {
        el.classList.toggle('active', el.dataset.cid === cid);
      });
      activeHistoryId = cid;
      conversationId  = cid;
      chatStarted     = true;

      // Show loading state in chat area
      const wrap = document.getElementById('chat-msgs');
      wrap.innerHTML = `
        <div style="display:flex;justify-content:center;padding:60px 0">
          <div class="dots">
            <div class="dot-sm"></div><div class="dot-sm"></div><div class="dot-sm"></div>
          </div>
        </div>`;
      document.getElementById('chat-hero').classList.add('hidden');

      try {
        const res = await fetch(`${BASE}/api/conversations/${cid}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();

        wrap.innerHTML = '';
        data.turns.forEach(turn => {
          const uEl = document.createElement('div');
          uEl.className = 'msg user restored';
          uEl.innerHTML = '<div class="msg-bubble">' + renderMd(turn.user) + '</div>';
          wrap.appendChild(uEl);

          const aEl = document.createElement('div');
          aEl.className = 'msg assistant restored';
          let aHtml = highlightCitations(renderMd(turn.assistant));
          if (turn.sources && turn.sources.length > 0) {
            aHtml += renderSources(turn.sources);
          }
          aEl.innerHTML = '<div class="msg-bubble">' + aHtml + '</div>';
          wrap.appendChild(aEl);
        });

        wrap.scrollTop = 99999;
      } catch (err) {
        wrap.innerHTML = `
          <div style="text-align:center;padding:60px 24px;color:var(--text-3);font-size:13px">
            Could not load this session.
          </div>`;
      }

      refreshSendBtn();
    }

    // ── Start a fresh conversation ─────────────────────────────────
    function startNewChat() {
      activeHistoryId = null;
      conversationId  = null;
      chatStarted     = false;

      document.getElementById('chat-msgs').innerHTML = '';
      document.getElementById('chat-hero').classList.remove('hidden');
      document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
      document.getElementById('chat-ta').value = '';
      document.getElementById('chat-ta').style.height = 'auto';
      refreshSendBtn();
      document.getElementById('chat-ta').focus();
    }

    // ── Delete a session ───────────────────────────────────────────
    async function deleteSession(e, cid) {
      e.stopPropagation();
      const item = document.querySelector(`.history-item[data-cid="${CSS.escape(cid)}"]`);
      if (!item) return;
      item.classList.add('deleting');

      try {
        const res = await fetch(`${BASE}/api/conversations/${cid}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) { item.classList.remove('deleting'); alert('Failed to delete session.'); return; }

        if (cid === activeHistoryId) startNewChat();

        item.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
        item.style.opacity = '0';
        item.style.transform = 'translateX(-8px)';
        setTimeout(() => loadHistory(), 220);

      } catch (err) {
        item.classList.remove('deleting');
        alert('Error: ' + err.message);
      }
    }

    // ── Library ────────────────────────────────────────────────────
    async function loadLibrary() {
      try {
        const res = await fetch(`${BASE}/api/upload/documents`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) { window.location.href = '../auth/login.html'; return; }
        if (!res.ok) return;
        const data = await res.json();
        libraryDocs = data.documents || [];
        activeDocs  = new Set();
        renderPicker(); updateAttachBtn(); refreshSendBtn();
      } catch (err) { console.error('Failed to load library:', err); }
    }

    // ── Picker ─────────────────────────────────────────────────────
    function togglePicker(e) {
      e.stopPropagation();
      pickerOpen = !pickerOpen;
      document.getElementById('doc-picker').classList.toggle('open', pickerOpen);
    }
    function closePicker() {
      pickerOpen = false;
      document.getElementById('doc-picker').classList.remove('open');
    }
    document.addEventListener('click', e => {
      if (pickerOpen && !e.target.closest('.mabel-input-box')) closePicker();
    });

    function renderPicker() {
      const list  = document.getElementById('doc-picker-list');
      const empty = document.getElementById('doc-picker-empty');
      list.querySelectorAll('.doc-picker-item').forEach(el => el.remove());
      if (!libraryDocs.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      libraryDocs.forEach(doc => {
        const isActive = activeDocs.has(doc.file_id);
        const item = document.createElement('div');
        item.className = 'doc-picker-item' + (isActive ? ' active' : '');
        item.dataset.fileId = doc.file_id;
        const name = doc.filename || 'Untitled';
        const short = name.length > 40 ? name.slice(0, 38) + '…' : name;
        item.innerHTML = `
          <div class="picker-check">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="picker-file-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="picker-info"><div class="picker-name">${esc(short)}</div></div>
          <button class="picker-delete-btn" title="Delete"
            onclick="deleteDoc(event, '${esc(doc.file_id)}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>`;
        item.addEventListener('click', e => {
          if (!e.target.closest('.picker-delete-btn')) toggleDoc(doc.file_id);
        });
        list.appendChild(item);
      });
    }

    function toggleDoc(fileId) {
      activeDocs.has(fileId) ? activeDocs.delete(fileId) : activeDocs.add(fileId);
      const item = document.querySelector(`.doc-picker-item[data-file-id="${fileId}"]`);
      if (item) item.classList.toggle('active', activeDocs.has(fileId));
      updateAttachBtn(); refreshSendBtn();
    }

    async function deleteDoc(e, fileId) {
      e.stopPropagation();
      const item = document.querySelector(`.doc-picker-item[data-file-id="${fileId}"]`);
      if (!item) return;
      item.classList.add('deleting');
      try {
        const res = await fetch(`${BASE}/api/upload/documents/${fileId}`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) { window.location.href = '../auth/login.html'; return; }
        if (!res.ok) { item.classList.remove('deleting'); alert('Failed to delete document.'); return; }
        libraryDocs = libraryDocs.filter(d => d.file_id !== fileId);
        activeDocs.delete(fileId);
        renderPicker(); updateAttachBtn(); refreshSendBtn();
      } catch (err) { item.classList.remove('deleting'); alert('Error: ' + err.message); }
    }

    function updateAttachBtn() {
      const n = activeDocs.size;
      document.getElementById('plus-btn').classList.toggle('has-docs', n > 0);
      const badge = document.getElementById('attach-badge');
      badge.textContent = n > 0 ? n : '';
      badge.classList.toggle('visible', n > 0);
    }

    function refreshSendBtn() {
      const hasText   = document.getElementById('chat-ta').value.trim().length > 0;
      const hasDocs   = activeDocs.size > 0;
      const uploading = uploadingCount > 0;
      const sendBtn   = document.getElementById('send-btn');
      const statusEl  = document.getElementById('upload-status');

      if (uploading) {
        sendBtn.disabled = true; sendBtn.style.display = 'none';
        statusEl.classList.add('visible');
        document.getElementById('upload-status-text').textContent =
          uploadingCount === 1 ? 'Uploading…' : `Uploading ${uploadingCount} files…`;
      } else {
        sendBtn.style.display = 'grid'; statusEl.classList.remove('visible');
        sendBtn.disabled = !(hasText || hasDocs);
      }
    }

    // ── File upload ────────────────────────────────────────────────
    function triggerUpload() { closePicker(); document.getElementById('file-in').click(); }

    document.getElementById('file-in').addEventListener('change', async e => {
      Array.from(e.target.files).forEach(uploadFile);
      e.target.value = '';
    });

    async function uploadFile(file) {
      if (uploadedDocs.find(d => d.name === file.name && d.uploading)) return;
      uploadedDocs.push({ name: file.name, document_id: null, uploading: true });
      uploadingCount++;
      renderDocTags(); refreshSendBtn();

      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch(`${BASE}/api/upload/upload`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd
        });
        if (res.status === 401) { window.location.href = '../auth/login.html'; return; }
        if (!res.ok) throw new Error('Upload failed');
        const data = await res.json();
        const doc = uploadedDocs.find(d => d.name === file.name && d.uploading);
        if (doc) { doc.document_id = data.document_id; doc.uploading = false; }
        libraryDocs.push({ file_id: data.document_id, filename: file.name });
        activeDocs.add(data.document_id);
        renderPicker(); updateAttachBtn();
      } catch (err) {
        uploadedDocs = uploadedDocs.filter(d => !(d.name === file.name && d.uploading));
        alert('Failed to upload ' + file.name + ': ' + err.message);
      } finally {
        uploadingCount = Math.max(0, uploadingCount - 1);
        renderDocTags(); refreshSendBtn();
      }
    }

    function renderDocTags() {
      const row = document.getElementById('mabel-badge-row');
      row.querySelectorAll('.mabel-doc-tag').forEach(t => t.remove());
      uploadedDocs.forEach((doc, idx) => {
        const sn = doc.name.length > 22 ? doc.name.slice(0, 20) + '…' : doc.name;
        const tag = document.createElement('div');
        tag.className = 'mabel-doc-tag';
        tag.innerHTML = `
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>${doc.uploading ? sn + ' ⏳' : sn}</span>
          <button onclick="removeUploadTag(${idx})">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>`;
        row.appendChild(tag);
      });
    }
    function removeUploadTag(idx) { uploadedDocs.splice(idx, 1); renderDocTags(); }

    // ── Input ──────────────────────────────────────────────────────
    const ta      = document.getElementById('chat-ta');
    const sendBtn = document.getElementById('send-btn');

    ta.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 160) + 'px';
      refreshSendBtn();
    });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    sendBtn.addEventListener('click', send);

    // ── Messages ───────────────────────────────────────────────────
    function addMsg(role, text, docsSnapshot) {
      const wrap = document.getElementById('chat-msgs');

      if (role === 'user') {
        if (!chatStarted) {
          chatStarted = true;
          document.getElementById('chat-hero').classList.add('hidden');
        }
        if (docsSnapshot && docsSnapshot.length) {
          const fileRow = document.createElement('div');
          fileRow.className = 'msg-file-row';
          docsSnapshot.forEach(doc => {
            const sn = doc.name.length > 32 ? doc.name.slice(0, 30) + '…' : doc.name;
            const card = document.createElement('div');
            card.className = 'msg-file-card';
            card.innerHTML = `
              <div class="msg-file-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </div>
              <div>
                <div class="msg-file-name">${esc(sn)}</div>
                <div class="msg-file-sub">${doc.isLibrary ? 'From library' : 'Uploaded &amp; indexed'}</div>
              </div>`;
            fileRow.appendChild(card);
          });
          wrap.appendChild(fileRow);
        }
      }

      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.innerHTML = '<div class="msg-bubble">' + renderMd(text) + '</div>';
      wrap.appendChild(el);
      wrap.scrollTop = 99999;
      return el;
    }

    // ── Send ───────────────────────────────────────────────────────
    async function send() {
      const text = ta.value.trim();
      if (!text || uploadingCount > 0) return;

      closePicker();
      ta.value = ''; ta.style.height = 'auto';
      sendBtn.disabled = true;
      const docsSnapshot = [
        ...uploadedDocs.filter(d => !d.uploading).map(d => ({ name: d.name, isLibrary: false })),
        ...libraryDocs
          .filter(d => activeDocs.has(d.file_id) && !uploadedDocs.find(u => u.document_id === d.file_id))
          .map(d => ({ name: d.filename || 'Untitled', isLibrary: true })),
      ];
      addMsg('user', text, docsSnapshot);
      uploadedDocs = []; renderDocTags();

      const thinking = addMsg('assistant', '');
      thinking.querySelector('.msg-bubble').innerHTML =
        '<div class="dots"><div class="dot-sm"></div><div class="dot-sm"></div><div class="dot-sm"></div></div>';

      try {
        const res = await fetch(`${BASE}/api/chat/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            query: text,
            conversation_id: conversationId,
            active_document_ids: activeDocs.size > 0 ? Array.from(activeDocs) : null,
          })
        });
        if (res.status === 401) { window.location.href = '../auth/login.html'; return; }

        const data = await res.json();
        conversationId  = data.conversation_id;
        activeHistoryId = data.conversation_id;

        document.querySelectorAll('.history-item').forEach(el => {
          el.classList.toggle('active', el.dataset.cid === conversationId);
        });

        let html = highlightCitations(renderMd(data.response));
        if (data.sources && data.sources.length > 0) {
          html += renderSources(data.sources);
        }
        thinking.querySelector('.msg-bubble').innerHTML = html;

        loadHistory();

      } catch (err) {
        thinking.querySelector('.msg-bubble').innerHTML =
          '<span style="color:var(--red)">Error: ' + esc(err.message) + '</span>';
      }

      refreshSendBtn();
      document.getElementById('chat-msgs').scrollTop = 99999;
    }

    // ── Helpers ────────────────────────────────────────────────────
    function esc(t) { const d = document.createElement('div'); d.textContent = String(t); return d.innerHTML; }

    function renderMd(t) {
      return esc(t)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code style="background:var(--border);padding:1px 5px;border-radius:3px;font-size:.9em;font-family:var(--mono)">$1</code>')
        .replace(/\n/g, '<br>');
    }

    function renderSources(sources) {
      if (!sources || !sources.length) return '';
      let html = '<div class="msg-sources">';
      sources.forEach((src, i) => {
        const n = i + 1;
        const score = src.rerank_score != null
          ? `<span class="msg-source-score">${src.rerank_score.toFixed(2)}</span>`
          : '';
        html += `<div class="msg-source-card">
          <div class="msg-source-top">
            <span class="msg-source-tag">Source ${n}</span>
            ${score}
          </div>
          <div class="msg-source-filename">${esc(src.filename)}</div>
          <div class="msg-source-text">${esc(src.text)}</div>
        </div>`;
      });
      html += '</div>';
      return html;
    }

    function highlightCitations(html) {
      return html.replace(/\[((source\s*\d+)(,\s*(source\s*)?\d+)*)\]/gi, (match, inner) => {
        const nums = inner.match(/\d+/g) || [];
        const pills = nums.map(n =>
          `<span class="cite-ref">Source ${n}</span>`
        ).join(' ');
        return pills;
      });
    }

    // ── Init ──────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        injectHistorySection();
        loadLibrary();
        loadHistory();
      }, 0);
    });
  </script>
</body>
</html>
