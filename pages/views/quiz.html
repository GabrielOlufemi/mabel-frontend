<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mabel — Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="nav.css">
  <style>
    .dot { transition: none !important; }

    /* ── Two-column body (mirrors flashcards fc-body) ── */
    .qz-body {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Left: scrollable viewer ── */
    .qz-viewer {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      padding: 24px 24px 32px;
    }
    .qz-viewer::-webkit-scrollbar { width: 4px; }
    .qz-viewer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Controls row ── */
    .qz-controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    .qz-controls-left, .qz-controls-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .qz-btn-text {}
    @media (max-width: 600px) {
      .qz-btn-text { display: none; }
      .qz-controls-row { gap: 6px; }
    }

    /* ── Card shell ── */
    .card-shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex-shrink: 0;
    }

    /* ── Progress bar ── */
    .progress-bar  { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .progress-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.3s ease; }

    /* ── Stats ── */
    .qz-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      flex-shrink: 0;
    }
    .stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-3); margin-bottom: 4px; font-family: var(--mono); }
    .stat-val   { font-size: 24px; font-weight: 700; color: var(--text); font-family: var(--mono); }

    /* ── Question ── */
    .q-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); font-family: var(--mono); }
    .q-text  { font-size: 18px; font-weight: 500; line-height: 1.55; color: var(--text); }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; font-family: var(--font); font-size: 15px;
      color: var(--text-2); text-align: left; width: 100%;
      transition: border-color .12s, background .12s, color .12s;
    }
    .option:hover:not(:disabled) { border-color: var(--border-strong); color: var(--text); background: var(--surface); }
    .option:disabled { cursor: not-allowed; }
    .option.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
    .option.wrong   { background: var(--red-bg);   border-color: var(--red);          color: var(--red); }
    .option-key {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--border); display: grid; place-items: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0; font-family: var(--mono);
    }
    .option.correct .option-key { background: var(--green-border); color: var(--green); }
    .option.wrong   .option-key { background: var(--red); color: white; }

    /* ── Feedback ── */
    .feedback { padding: 12px 16px; border-radius: 8px; font-weight: 500; font-size: 15px; }
    .feedback.ok   { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .feedback.fail { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red); }
    .explanation {
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; line-height: 1.6;
      color: var(--text-2); background: var(--surface);
      border: 1px solid var(--border);
    }
    .qz-next { display: flex; justify-content: flex-end; }

    /* ── Final score ── */
    .final { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 40px 24px; text-align: center; }
    .final-pct   { font-size: 72px; font-weight: 700; font-family: var(--mono); line-height: 1; }
    .final-label { font-size: 20px; font-weight: 600; color: var(--text-2); }
    .final-sub   { font-size: 15px; color: var(--text-3); margin-bottom: 4px; }
    .final-btns  { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    /* ── Loading dots ── */
    .fc-dots { display: flex; gap: 5px; justify-content: center; padding: 28px 0; }
    .fc-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); animation: blink 1.2s infinite; }
    .fc-dot:nth-child(2) { animation-delay: .2s; }
    .fc-dot:nth-child(3) { animation-delay: .4s; }

    /* ── Right: question list panel ── */
    .qz-rhs {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 24px 20px 32px;
      position: relative;
      overflow: hidden;
    }
    .qz-rhs::before {
      content: '';
      position: absolute;
      left: 0; top: 24px; bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .rhs-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; font-family: var(--mono); flex-shrink: 0; }
    .qz-list { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
    .qz-list::-webkit-scrollbar { width: 4px; }
    .qz-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .qz-list-item {
      padding: 9px 12px; border-radius: var(--radius-sm);
      border: 1px solid transparent;
      display: flex; align-items: flex-start; gap: 10px; flex-shrink: 0;
      transition: background .12s, border-color .12s;
    }
    .qz-list-item.current       { background: var(--surface); border-color: var(--border-strong); }
    .qz-list-item.answered-ok   { border-left: 2px solid var(--green); padding-left: 10px; }
    .qz-list-item.answered-fail { border-left: 2px solid var(--red);   padding-left: 10px; }
    .qz-list-num { font-size: 11px; color: var(--text-3); font-family: var(--mono); white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
    .qz-list-q   { font-size: 13px; color: var(--text-2); line-height: 1.45; }

    /* ── Question count selector ── */
    .q-count-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .q-count-label { font-size: 13px; color: var(--text-3); font-family: var(--mono); white-space: nowrap; }
    .q-count-select {
      padding: 6px 10px; font-size: 13px; font-family: var(--mono);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg); color: var(--text-2);
      cursor: pointer; outline: none; transition: border-color .12s;
    }
    .q-count-select:hover, .q-count-select:focus { border-color: var(--border-strong); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
    .animate-in { animation: slideUp 0.2s ease; }

    @media (max-width: 960px) { .qz-rhs { display: none; } }
    @media (max-width: 768px) {
      .qz-viewer { padding: 16px 16px 24px; }
      .q-text    { font-size: 16px; }
    }
  </style>
</head>
<body>
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = '../auth/login.html';
    }
  </script>

  <script>NAV_ACTIVE = 'quiz';</script>
  <script src="nav.js"></script>

  <div class="layout">
    <main class="main">
      <div class="page-wrap">

        <div class="page-topbar">
          <div class="page-topbar-left">
            <div class="page-topbar-title">Quiz</div>
            <div class="page-topbar-sub" id="topbar-sub">Upload a document to generate a quiz</div>
          </div>
        </div>

        <div class="page-body" style="overflow:hidden; display:flex; flex-direction:column;">
          <input type="file" id="file-in" accept=".txt,.md,.pdf,.csv,.docx" style="display:none"/>

          <!-- ── Upload state ── -->
          <div class="upload-state" id="upload-view">
            <div class="upload-card" onclick="triggerUpload()">
              <div class="upload-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <h3>Upload your document</h3>
              <p>MABEL will create a multiple-choice quiz to test your understanding.</p>
              <div class="upload-formats">
                <span class="fmt-tag">pdf</span>
                <span class="fmt-tag">docx</span>
                <span class="fmt-tag">txt</span>
                <span class="fmt-tag">csv</span>
              </div>
              <div class="q-count-row" onclick="event.stopPropagation()">
                <label class="q-count-label" for="q-count-select">How many questions?</label>
                <select id="q-count-select" class="q-count-select">
                  <option value="3">3 questions</option>
                  <option value="5">5 questions</option>
                  <option value="6" selected>6 questions</option>
                  <option value="8">8 questions</option>
                  <option value="10">10 questions</option>
                  <option value="12">12 questions</option>
                  <option value="15">15 questions</option>
                  <option value="20">20 questions</option>
                </select>
              </div>
            </div>
          </div>

          <!-- ── Quiz view ── -->
          <div class="qz-body" id="quiz-view" style="display:none">

            <div class="qz-viewer">

              <!-- Loading -->
              <div class="card-shell" id="qz-loading" style="display:none">
                <div class="fc-dots">
                  <div class="fc-dot"></div><div class="fc-dot"></div><div class="fc-dot"></div>
                </div>
              </div>

              <!-- Active quiz -->
              <div id="qz-deck" style="display:none; flex-direction:column; gap:16px;">

                <!-- Controls row -->
                <div class="qz-controls-row">
                  <div class="qz-controls-left">
                    <div class="doc-pill">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                      <span id="doc-pill-name"></span>
                    </div>
                    <button class="nav-btn" onclick="triggerUpload()">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                      <span class="qz-btn-text">Upload new</span>
                    </button>
                  </div>
                  <div class="qz-controls-right">
                    <button class="nav-btn primary" id="gen-btn" onclick="generateQuiz()">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                      <span class="qz-btn-text">Regenerate</span>
                    </button>
                  </div>
                </div>

                <!-- Stats -->
                <div class="qz-stats">
                  <div class="stat-card"><div class="stat-label">Score</div><div class="stat-val" id="q-score">0</div></div>
                  <div class="stat-card"><div class="stat-label">Question</div><div class="stat-val" id="q-num">—</div></div>
                  <div class="stat-card"><div class="stat-label">Remaining</div><div class="stat-val" id="q-remain">—</div></div>
                </div>

                <!-- Question card -->
                <div class="card-shell animate-in" id="quiz-card">
                  <div class="progress-bar">
                    <div class="progress-fill" id="qz-prog" style="width:0%"></div>
                  </div>
                  <div class="q-label" id="q-label">Question 1</div>
                  <div class="q-text"  id="q-text">—</div>
                  <div class="options" id="q-opts"></div>
                  <div id="q-feedback" style="display:none"></div>
                  <div class="qz-next" id="q-next" style="display:none">
                    <button class="nav-btn primary" id="next-btn" onclick="nextQuestion()">Next question →</button>
                  </div>
                </div>

              </div><!-- /qz-deck -->
            </div><!-- /qz-viewer -->

            <!-- Right panel -->
            <div class="qz-rhs">
              <div class="rhs-label">All Questions</div>
              <div class="qz-list" id="qz-list"></div>
            </div>

          </div><!-- /qz-body -->
        </div><!-- /page-body -->

      </div><!-- /page-wrap -->
    </main>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const BASE  = 'http://localhost:8000';
    const $     = id => document.getElementById(id);
    const getQCount = () => parseInt($('q-count-select')?.value || '6', 10);

    function authHeaders(extra) {
      return { 'Authorization': `Bearer ${token}`, ...extra };
    }

    // ── localStorage session — namespaced per user (same pattern as flashcards) ──
    function getUserIdFromToken() {
      try {
        const payload = token.split('.')[1];
        const decoded = JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
        return decoded.sub || decoded.user_id || decoded.id || 'unknown';
      } catch { return 'unknown'; }
    }
    const _uid          = getUserIdFromToken();
    const LS_QZ_QUESTIONS = `qz_questions_${_uid}`;
    const LS_QZ_DOC_ID    = `qz_doc_id_${_uid}`;
    const LS_QZ_DOC_NAME  = `qz_doc_name_${_uid}`;
    const LS_QZ_IDX       = `qz_idx_${_uid}`;
    const LS_QZ_SCORE     = `qz_score_${_uid}`;
    const LS_QZ_TOPBAR    = `qz_topbar_${_uid}`;
    const LS_QZ_FINISHED  = `qz_finished_${_uid}`;

    function saveSession(finished = false) {
      try {
        localStorage.setItem(LS_QZ_QUESTIONS, JSON.stringify(questions));
        localStorage.setItem(LS_QZ_DOC_ID,    currentDocId   || '');
        localStorage.setItem(LS_QZ_DOC_NAME,  currentDocName || '');
        localStorage.setItem(LS_QZ_IDX,       String(qIdx));
        localStorage.setItem(LS_QZ_SCORE,     String(qScore));
        localStorage.setItem(LS_QZ_TOPBAR,    $('topbar-sub').textContent);
        localStorage.setItem(LS_QZ_FINISHED,  finished ? '1' : '0');
      } catch { /* storage unavailable */ }
    }

    function clearSession() {
      try {
        [LS_QZ_QUESTIONS,LS_QZ_DOC_ID,LS_QZ_DOC_NAME,LS_QZ_IDX,LS_QZ_SCORE,LS_QZ_TOPBAR,LS_QZ_FINISHED]
          .forEach(k => localStorage.removeItem(k));
      } catch { /* storage unavailable */ }
    }

    function restoreSession() {
      try {
        const saved = localStorage.getItem(LS_QZ_QUESTIONS);
        if (!saved) return 'none';
        questions      = JSON.parse(saved);
        currentDocId   = localStorage.getItem(LS_QZ_DOC_ID)   || null;
        currentDocName = localStorage.getItem(LS_QZ_DOC_NAME) || null;
        qIdx           = parseInt(localStorage.getItem(LS_QZ_IDX)   || '0', 10);
        qScore         = parseInt(localStorage.getItem(LS_QZ_SCORE) || '0', 10);
        const topbar   = localStorage.getItem(LS_QZ_TOPBAR);
        if (topbar) $('topbar-sub').textContent = topbar;
        if (currentDocName) $('doc-pill-name').textContent = currentDocName;
        if (!questions.length) return 'none';
        return localStorage.getItem(LS_QZ_FINISHED) === '1' ? 'finished' : 'active';
      } catch { clearSession(); return 'none'; }
    }

    let currentDocId   = null;
    let currentDocName = null;
    let questions      = [];
    let qIdx           = 0;
    let qScore         = 0;
    let qAnswered      = false;

    // ── File input ─────────────────────────────────────────────────────────────
    $('file-in').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      e.target.value = '';
      await uploadAndGenerate(file);
    });
    function triggerUpload() { $('file-in').click(); }

    // ── Boot ──────────────────────────────────────────────────────────────────
    const _restored = restoreSession();
    if (_restored === 'finished') {
      showQuiz();
      renderQuestionList();
      showFinalScore();
    } else if (_restored === 'active') {
      showQuiz();
      renderQuestionList();
      loadQuestion();
    }

    // ── Upload → generate ──────────────────────────────────────────────────────
    async function uploadAndGenerate(file) {
      currentDocName = file.name;
      $('doc-pill-name').textContent = file.name;
      $('topbar-sub').textContent    = file.name;

      const btn = $('gen-btn');
      if (btn) { btn.disabled = true; btn.querySelector('.qz-btn-text').textContent = 'Uploading…'; }
      showLoading();

      try {
        const fd = new FormData();
        fd.append('file', file);
        const upRes = await fetch(`${BASE}/api/upload/upload`, {
          method: 'POST', headers: authHeaders(), body: fd,
        });
        if (upRes.status === 401) { window.location.href = '../auth/login.html'; return; }
        if (!upRes.ok) {
          const err = await upRes.json().catch(() => ({}));
          throw new Error(err.detail || `Upload failed (${upRes.status})`);
        }
        currentDocId = (await upRes.json()).document_id;
        clearSession();
        if (btn) btn.querySelector('.qz-btn-text').textContent = 'Generating…';
        await generateQuiz();
      } catch (err) {
        hideLoading();
        alert('Error: ' + err.message);
        showUpload();
        resetGenBtn();
      }
    }

    // ── Generate quiz from existing doc ───────────────────────────────────────
    async function generateQuiz() {
      if (!currentDocId) { triggerUpload(); return; }

      const btn = $('gen-btn');
      if (btn) btn.disabled = true;
      showLoading();

      try {
        const res = await fetch(`${BASE}/api/study/quiz/generate`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({
            file_id:        currentDocId,
            filename:       currentDocName,
            question_count: getQCount(),
          }),
        });
        if (res.status === 401) { window.location.href = '../auth/login.html'; return; }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Generation failed (${res.status})`);
        }

        const data = await res.json();
        questions  = data.questions;
        qIdx       = 0;
        qScore     = 0;
        qAnswered  = false;
        clearSession();

        $('topbar-sub').textContent = `${currentDocName} — ${questions.length} questions`;
        saveSession();
        hideLoading();
        showQuiz();
        renderQuestionList();
        loadQuestion();
        resetGenBtn();

      } catch (err) {
        hideLoading();
        if (questions.length) showQuiz(); else showUpload();
        alert('Error: ' + err.message);
        resetGenBtn();
      }
    }

    // ── View helpers ───────────────────────────────────────────────────────────
    function showLoading() {
      $('upload-view').style.display    = 'none';
      $('quiz-view').style.display      = 'flex';
      $('qz-loading').style.display     = 'flex';
      $('qz-deck').style.display        = 'none';
    }
    function hideLoading() { $('qz-loading').style.display = 'none'; }
    function showQuiz() {
      $('upload-view').style.display    = 'none';
      $('quiz-view').style.display      = 'flex';
      $('qz-loading').style.display     = 'none';
      $('qz-deck').style.display        = 'flex';
    }
    function showUpload() {
      $('upload-view').style.display    = 'flex';
      $('quiz-view').style.display      = 'none';
      $('topbar-sub').style.display     = '';
      $('topbar-sub').textContent       = 'Upload a document to generate a quiz';
    }
    function resetGenBtn() {
      const btn = $('gen-btn');
      if (!btn) return;
      btn.disabled  = false;
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg><span class="qz-btn-text"> Regenerate</span>';
    }

    // ── Stats ──────────────────────────────────────────────────────────────────
    function updateStats() {
      $('q-score').textContent  = qScore;
      $('q-num').textContent    = Math.min(qIdx + 1, questions.length) + '/' + questions.length;
      $('q-remain').textContent = Math.max(questions.length - qIdx, 0);
      $('qz-prog').style.width  = (((qIdx + 1) / questions.length) * 100) + '%';
    }

    // ── Load question ──────────────────────────────────────────────────────────
    function loadQuestion() {
      if (qIdx >= questions.length) { showFinalScore(); return; }

      qAnswered     = false;
      const q       = questions[qIdx];
      const letters = ['A', 'B', 'C', 'D'];

      $('q-label').textContent      = `Question ${qIdx + 1} of ${questions.length}`;
      $('q-text').textContent       = q.q;
      $('q-feedback').style.display = 'none';
      $('q-next').style.display     = 'none';
      $('q-opts').innerHTML         = q.options.map((opt, i) =>
        `<button class="option" onclick="answer(${i})">
          <span class="option-key">${letters[i]}</span>${esc(opt)}
        </button>`
      ).join('');

      document.querySelectorAll('.qz-list-item').forEach((el, i) =>
        el.classList.toggle('current', i === qIdx)
      );
      const active = document.querySelector('.qz-list-item.current');
      if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      updateStats();
    }

    // ── Answer ─────────────────────────────────────────────────────────────────
    function answer(chosen) {
      if (qAnswered) return;
      qAnswered     = true;

      const q       = questions[qIdx];
      const correct = q.answer;
      const isRight = chosen === correct;
      if (isRight) qScore++;

      document.querySelectorAll('.option').forEach((btn, i) => {
        btn.disabled = true;
        if (i === correct)                 btn.classList.add('correct');
        else if (i === chosen && !isRight) btn.classList.add('wrong');
      });

      const fb = $('q-feedback');
      fb.style.display = 'block';
      let html = `<div class="feedback ${isRight ? 'ok' : 'fail'}">
        ${isRight ? 'Correct!' : `Correct answer: ${esc(q.options[correct])}`}
      </div>`;
      if (q.explanation) html += `<div class="explanation">${esc(q.explanation)}</div>`;
      fb.innerHTML = html;
      const isLast = qIdx === questions.length - 1;
      $('next-btn').textContent = isLast ? 'Finish quiz' : 'Next question →';
      $('q-next').style.display = 'flex';

      const listItem = document.querySelectorAll('.qz-list-item')[qIdx];
      if (listItem) {
        listItem.classList.remove('current');
        listItem.classList.add(isRight ? 'answered-ok' : 'answered-fail');
      }

      saveSession();
      updateStats();
    }

    function nextQuestion() {
      qIdx++;
      if (qIdx >= questions.length) showFinalScore();
      else loadQuestion();
    }

    // ── Question list ──────────────────────────────────────────────────────────
    function renderQuestionList() {
      $('qz-list').innerHTML = questions.map((q, i) =>
        `<div class="qz-list-item ${i === qIdx ? 'current' : ''}">
          <div class="qz-list-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="qz-list-q">${esc(q.q)}</div>
        </div>`
      ).join('');
    }

    // ── Final score — show overlay inside quiz-card without destroying its children
    function showFinalScore() {
      const pct = Math.round((qScore / questions.length) * 100);
      const col = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
      const msg = pct >= 80 ? 'Great work!' : pct >= 50 ? 'Good effort!' : 'Keep studying!';

      // Hide question children, show final overlay — never wipe innerHTML
      ['q-label','q-text','q-opts','q-feedback','q-next'].forEach(id => {
        const el = $(id); if (el) el.style.display = 'none';
      });
      $('qz-prog').style.width = '100%';

      let overlay = $('final-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'final-overlay';
        $('quiz-card').appendChild(overlay);
      }
      overlay.innerHTML = `
        <div class="final">
          <div class="final-pct" style="color:${col}">${pct}%</div>
          <div class="final-label">${msg}</div>
          <div class="final-sub">${qScore} out of ${questions.length} correct</div>
          <div class="final-btns">
            <button class="nav-btn" onclick="retryQuiz()">↺ Same questions</button>
            <button class="nav-btn primary" onclick="generateQuiz()">↻ New questions</button>
          </div>
        </div>`;
      overlay.style.display = 'block';

      $('q-remain').textContent = '0';
      saveSession(true); // persist finished state
    }

    function retryQuiz() {
      qIdx = 0; qScore = 0; qAnswered = false;
      const overlay = $('final-overlay');
      if (overlay) overlay.style.display = 'none';
      ['q-label','q-text','q-opts','q-feedback','q-next'].forEach(id => {
        const el = $(id); if (el) el.style.display = '';
      });
      saveSession(false); // unmark finished
      showQuiz();
      renderQuestionList();
      loadQuestion();
    }

    function esc(t) { const d = document.createElement('div'); d.textContent = String(t); return d.innerHTML; }
  </script>
</body>
</html>
