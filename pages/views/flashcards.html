<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mabel — Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="nav.css">
  <style>
    .dot          { transition: none !important; }
    .fc-inner     { transition: transform 0.45s cubic-bezier(.4,0,.2,1) !important; }
    .progress-fill{ transition: width 0.3s ease !important; }

    /* ── Two-column body ── */
    .fc-body {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Left: scrollable viewer ── */
    .fc-viewer {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      padding: 24px 24px 32px;
    }
    .fc-viewer::-webkit-scrollbar { width: 4px; }
    .fc-viewer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Controls row: doc pill + upload LEFT, shuffle + regen RIGHT ── */
    .fc-controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    .fc-controls-left,
    .fc-controls-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .fc-btn-text { }
    @media (max-width: 600px) {
      .fc-btn-text { display: none; }
      .fc-controls-row { gap: 6px; }
    }

    /* ── Card shell ── */
    .card-shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
    }

    /* ── Flashcard 3D flip ── */
    .fc-scene  { perspective: 1200px; cursor: pointer; flex-shrink: 0; }
    .fc-inner  { width: 100%; position: relative; transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
    .fc-inner.flipped { transform: rotateY(180deg); }

    .fc-front {
      position: relative;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 36px 28px;
      text-align: center;
      min-height: 220px;
      box-sizing: border-box;
    }

    .fc-back {
      position: absolute; inset: 0;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 12px;
      background: var(--text); color: #fff;
      transform: rotateY(180deg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 36px 28px;
      text-align: center;
      overflow-y: auto;
      box-sizing: border-box;
    }
    body.dark .fc-back { background: #f0f0ee; color: #0a0a0a; }

    .fc-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; opacity: .4; font-family: var(--mono); flex-shrink: 0; }
    .fc-text  { font-size: 18px; font-weight: 500; line-height: 1.6; max-width: 480px; word-break: break-word; }
    .fc-hint  { font-size: 13px; opacity: .3; margin-top: 4px; flex-shrink: 0; }

    /* ── Progress bar ── */
    .progress-bar  { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .progress-fill { height: 100%; background: var(--text); border-radius: 2px; }

    /* ── Nav row: 3 equal buttons ── */
    .fc-nav-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ── Bottom row: Restart truly centered ── */
    .fc-bottom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── Counter row ── */
    .fc-counter-row {
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── Counter ── */
    .fc-counter {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-3);
      font-family: var(--mono, 'DM Mono', monospace);
      white-space: nowrap;
    }

    /* ── Three equal nav buttons ── */
    .fc-nav-btn {
      flex: 1;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--sans, 'DM Sans', sans-serif);
      border-radius: var(--radius-sm, 6px);
      border: 1px solid var(--text);
      background: var(--text);
      color: #fff;
      cursor: pointer;
      transition: opacity .12s;
      white-space: nowrap;
      text-align: center;
    }
    body.dark .fc-nav-btn { background: #f0f0ee; color: #0a0a0a; border-color: #f0f0ee; }
    .fc-nav-btn:hover:not(:disabled) { opacity: .85; }
    .fc-nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .fc-nav-btn--ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    body.dark .fc-nav-btn--ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
    .fc-nav-btn--ghost:hover:not(:disabled) { background: var(--surface); border-color: var(--border-strong); opacity: 1; }

    /* ── Restart button ── */
    .btn-restart {
      width: 100%;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--sans, 'DM Sans', sans-serif);
      border-radius: var(--radius-sm, 6px);
      border: 1px solid #e03e3e;
      background: transparent;
      color: #e03e3e;
      cursor: pointer;
      text-align: center;
      transition: background .12s;
    }
    .btn-restart:hover {
      background: rgba(224, 62, 62, 0.08);
    }

    /* ── Keyboard hint ── */
    .kb-hint { text-align: center; font-size: 12px; color: var(--text-3); font-family: var(--mono); flex-shrink: 0; }
    .kb-hint kbd { display: inline-block; background: var(--border); border-radius: 4px; padding: 1px 6px; font-size: 11px; }

    /* ── Loading dots ── */
    .fc-dots { display: flex; gap: 5px; justify-content: center; padding: 28px 0; }
    .fc-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); animation: blink 1.2s infinite; }
    .fc-dot:nth-child(2) { animation-delay: .2s; }
    .fc-dot:nth-child(3) { animation-delay: .4s; }

    /* ── Right: all-cards panel ── */
    .fc-rhs {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 24px 20px 32px;
      position: relative;
      overflow: hidden;
    }
    .fc-rhs::before {
      content: '';
      position: absolute;
      left: 0;
      top: 24px;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .rhs-label {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .07em;
      font-family: var(--mono); flex-shrink: 0;
    }
    .fc-list {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; gap: 2px;
      overflow-y: auto;
    }
    .fc-list::-webkit-scrollbar { width: 4px; }
    .fc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .fc-list-item {
      padding: 9px 12px; border-radius: var(--radius-sm);
      border: 1px solid transparent; cursor: pointer;
      transition: background .12s, border-color .12s;
      display: flex; align-items: flex-start; gap: 10px; flex-shrink: 0;
    }
    .fc-list-item:hover   { background: var(--surface); border-color: var(--border); }
    .fc-list-item.current { background: var(--surface); border-color: var(--border-strong); }
    .fc-list-num { font-size: 11px; color: var(--text-3); font-family: var(--mono); white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
    .fc-list-q   { font-size: 13px; color: var(--text-2); line-height: 1.45; }

    /* ── Card count selector ── */
    .card-count-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .card-count-label {
      font-size: 13px;
      color: var(--text-3);
      font-family: var(--mono, monospace);
      white-space: nowrap;
    }
    .card-count-select {
      padding: 6px 10px;
      font-size: 13px;
      font-family: var(--mono, monospace);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm, 6px);
      background: var(--bg, #0a0a0a);
      color: var(--text-2);
      cursor: pointer;
      outline: none;
      transition: border-color .12s;
    }
    .card-count-select:hover,
    .card-count-select:focus { border-color: var(--border-strong, var(--border)); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
    .animate-in { animation: slideUp 0.2s ease; }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .fc-rhs { display: none; }
    }
    @media (max-width: 768px) {
      .fc-viewer { padding: 16px 16px 24px; }
      .fc-text   { font-size: 16px; }
    }
  </style>
</head>
<body>
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = '../auth/login.html';
    }
  </script>

  <script>NAV_ACTIVE = 'flashcards';</script>
  <script src="nav.js"></script>

  <div class="layout">
    <main class="main">
      <div class="page-wrap">

        <div class="page-topbar">
          <div class="page-topbar-left">
            <div class="page-topbar-title">Flashcards</div>
            <div class="page-topbar-sub" id="topbar-sub">Upload a document to generate study cards</div>
          </div>
        </div>

        <div class="page-body" style="overflow:hidden; display:flex; flex-direction:column;">
          <input type="file" id="file-in" accept=".txt,.md,.pdf,.csv,.docx" multiple style="display:none"/>

          <!-- ── Upload state ── -->
          <div class="upload-state" id="upload-view">
            <div class="upload-card" onclick="triggerUpload()">
              <div class="upload-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
              </div>
              <h3>Upload your document</h3>
              <p>MABEL will generate flashcards you can flip through and review.</p>
              <div class="upload-formats">
                <span class="fmt-tag">pdf</span>
                <span class="fmt-tag">docx</span>
                <span class="fmt-tag">txt</span>
                <span class="fmt-tag">csv</span>
              </div>
              <div class="card-count-row" onclick="event.stopPropagation()">
                <label class="card-count-label" for="card-count-select">How many cards?</label>
                <select id="card-count-select" class="card-count-select">
                  <option value="5">5 cards</option>
                  <option value="8" selected>8 cards</option>
                  <option value="10">10 cards</option>
                  <option value="12">12 cards</option>
                  <option value="15">15 cards</option>
                  <option value="20">20 cards</option>
                </select>
              </div>
            </div>
          </div>

          <!-- ── Deck view ── -->
          <div class="fc-body" id="deck-view" style="display:none">

            <!-- Left: viewer -->
            <div class="fc-viewer">

              <!-- Loading state -->
              <div class="card-shell" id="fc-loading" style="display:none">
                <div class="fc-dots">
                  <div class="fc-dot"></div><div class="fc-dot"></div><div class="fc-dot"></div>
                </div>
              </div>

              <!-- Deck -->
              <div id="fc-deck" style="display:none; flex-direction:column; gap:16px;">

                <!-- ROW 1: doc pill + upload · shuffle + regenerate -->
                <div class="fc-controls-row">
                  <div class="fc-controls-left">
                    <div class="doc-pill">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                      <span id="doc-pill-name"></span>
                    </div>
                    <button class="nav-btn" onclick="triggerUpload()">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                      <span class="fc-btn-text">Upload new</span>
                    </button>
                  </div>
                  <div class="fc-controls-right">
                    <button class="nav-btn" onclick="shuffleCards()">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
                      <span class="fc-btn-text">Shuffle</span>
                    </button>
                    <button class="nav-btn primary" id="gen-btn" onclick="generateFlashcards()">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                      <span class="fc-btn-text">Regenerate</span>
                    </button>
                  </div>
                </div>

                <!-- ROW 2: the card itself -->
                <div class="card-shell animate-in">
                  <div class="progress-bar">
                    <div class="progress-fill" id="fc-prog" style="width:12.5%"></div>
                  </div>
                  <div class="fc-scene" id="fc-scene">
                    <div class="fc-inner" id="fc-inner">
                      <div class="fc-face fc-front">
                        <div class="fc-label">Question</div>
                        <div class="fc-text" id="fc-q">—</div>
                        <div class="fc-hint">Click to flip</div>
                      </div>
                      <div class="fc-face fc-back">
                        <div class="fc-label">Answer</div>
                        <div class="fc-text" id="fc-a">—</div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- ROW 3: Previous | Flip Card | Next -->
                <div class="fc-nav-row">
                  <button class="fc-nav-btn fc-nav-btn--ghost" id="fc-prev">← Previous</button>
                  <button class="fc-nav-btn fc-nav-btn--ghost" onclick="flipCard()">↕ Flip Card</button>
                  <button class="fc-nav-btn" id="fc-next">Next →</button>
                </div>

                <!-- ROW 4: Restart -->
                <div class="fc-bottom-row">
                  <button class="btn-restart" onclick="resetDeck()">↺ Restart</button>
                </div>

                <!-- ROW 5: keyboard hint -->
                <div class="kb-hint">
                  <kbd>←</kbd> <kbd>→</kbd> to navigate &nbsp;·&nbsp; <kbd>Space</kbd> to flip
                </div>

                <!-- ROW 6: counter -->
                <div class="fc-counter-row">
                  <span class="fc-counter" id="fc-ctr">1 / 8</span>
                </div>

              </div><!-- /fc-deck -->
            </div><!-- /fc-viewer -->

            <!-- Right: all cards -->
            <div class="fc-rhs" id="fc-rhs">
              <div class="rhs-label">All Cards</div>
              <div class="fc-list" id="fc-list"></div>
            </div>

          </div><!-- /fc-body -->
        </div><!-- /page-body -->

      </div><!-- /page-wrap -->
    </main>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const BASE  = 'http://127.0.0.1:8000';
    const $     = id => document.getElementById(id);

    const getCardCount = () => parseInt($('card-count-select')?.value || '8', 10);

    // ── localStorage keys — namespaced per user to prevent session bleed ─────
    // Decodes the JWT payload (middle segment) to extract the user identifier.
    // This is for key namespacing only — all security decisions happen server-side.
    function getUserIdFromToken() {
      try {
        const payload = token.split('.')[1];
        const decoded = JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
        return decoded.sub || decoded.user_id || decoded.id || 'unknown';
      } catch {
        return 'unknown';
      }
    }
    const _uid        = getUserIdFromToken();
    const LS_CARDS    = `fc_cards_${_uid}`;
    const LS_DOC_ID   = `fc_doc_id_${_uid}`;
    const LS_DOC_NAME = `fc_doc_name_${_uid}`;
    const LS_IDX      = `fc_idx_${_uid}`;
    const LS_TOPBAR   = `fc_topbar_${_uid}`;

    // ── State ─────────────────────────────────────────────────────────────────
    let cards          = [];
    let cardIdx        = 0;
    let currentDocId   = null;
    let currentDocName = null;

    // ── Persist / restore ─────────────────────────────────────────────────────
    function saveSession() {
      try {
        localStorage.setItem(LS_CARDS,    JSON.stringify(cards));
        localStorage.setItem(LS_DOC_ID,   currentDocId   || '');
        localStorage.setItem(LS_DOC_NAME, currentDocName || '');
        localStorage.setItem(LS_IDX,      String(cardIdx));
        localStorage.setItem(LS_TOPBAR,   $('topbar-sub').textContent);
      } catch { /* storage unavailable — session won't persist but page still works */ }
    }

    function clearSession() {
      try {
        [LS_CARDS, LS_DOC_ID, LS_DOC_NAME, LS_IDX, LS_TOPBAR].forEach(k => localStorage.removeItem(k));
      } catch { /* storage unavailable */ }
    }

    function restoreSession() {
      try {
        const saved = localStorage.getItem(LS_CARDS);
        if (!saved) return false;
        cards          = JSON.parse(saved);
        currentDocId   = localStorage.getItem(LS_DOC_ID)   || null;
        currentDocName = localStorage.getItem(LS_DOC_NAME) || null;
        cardIdx        = parseInt(localStorage.getItem(LS_IDX) || '0', 10);
        const topbar   = localStorage.getItem(LS_TOPBAR);
        if (topbar) $('topbar-sub').textContent = topbar;
        if (currentDocName) $('doc-pill-name').textContent = currentDocName;
        return cards.length > 0;
      } catch {
        clearSession();
        return false;
      }
    }

    // ── Auth header helper ────────────────────────────────────────────────────
    function authHeaders() {
      return { 'Authorization': `Bearer ${token}` };
    }

    // ── View helpers ──────────────────────────────────────────────────────────
    function showDeck() {
      $('upload-view').style.display = 'none';
      $('deck-view').style.display   = 'flex';
      $('fc-loading').style.display  = 'none';
      $('fc-deck').style.display     = 'flex';
      renderCard();
      renderCardList();
    }

    function showLoading() {
      $('upload-view').style.display = 'none';
      $('deck-view').style.display   = 'flex';
      $('fc-loading').style.display  = 'flex';
      $('fc-deck').style.display     = 'none';
    }

    function showUpload() {
      $('upload-view').style.display = 'flex';
      $('deck-view').style.display   = 'none';
      $('fc-loading').style.display  = 'none';
      $('fc-deck').style.display     = 'none';
      $('topbar-sub').textContent    = 'Upload a document to generate study cards';
    }

    function resetGenBtn() {
      $('gen-btn').disabled   = false;
      $('gen-btn').innerHTML  = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg><span class="fc-btn-text"> Regenerate</span>';
    }

    // ── File input ────────────────────────────────────────────────────────────
    $('file-in').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;

      clearSession();
      currentDocId   = null;
      currentDocName = file.name;

      $('doc-pill-name').textContent = file.name;
      $('topbar-sub').textContent    = file.name;

      await uploadAndGenerate(file);
      e.target.value = '';
    });

    function triggerUpload() { $('file-in').click(); }

    // ── Step 1: upload ────────────────────────────────────────────────────────
    async function uploadDoc(file) {
      const formData = new FormData();
      formData.append('file', file);

      const res = await fetch(`${BASE}/api/upload/upload`, {
        method: 'POST',
        headers: authHeaders(),
        body: formData,
      });

      if (res.status === 401) { window.location.href = '../auth/login.html'; return null; }
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Upload failed (${res.status})`);
      }

      const data = await res.json();
      return data.document_id;
    }

    // ── Step 2: generate ──────────────────────────────────────────────────────
    async function generateFromId(docId, filename) {
      const res = await fetch(`${BASE}/api/study/flashcards/generate`, {
        method: 'POST',
        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({
          file_id:    docId,
          filename:   filename,
          card_count: getCardCount(),
          save:       true,
        }),
      });

      if (res.status === 401) { window.location.href = '../auth/login.html'; return null; }
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Generation failed (${res.status})`);
      }

      const data = await res.json();
      return data.cards;
    }

    // ── Combined flow for a fresh file ───────────────────────────────────────
    async function uploadAndGenerate(file) {
      const btn = $('gen-btn');
      btn.disabled  = true;
      btn.innerHTML = '<span class="fc-btn-text">Uploading…</span>';
      $('fc-inner').classList.remove('flipped');
      showLoading();

      try {
        currentDocId = await uploadDoc(file);
        if (!currentDocId) return;

        btn.innerHTML = '<span class="fc-btn-text">Generating…</span>';

        const newCards = await generateFromId(currentDocId, file.name);
        if (!newCards) return;

        cards   = newCards;
        cardIdx = 0;
        $('topbar-sub').textContent = `${file.name} — ${cards.length} cards`;
        saveSession();
        showDeck();
        resetGenBtn();

      } catch (err) {
        $('fc-loading').style.display = 'none';
        if (cards.length) showDeck(); else showUpload();
        alert('Error: ' + err.message);
        btn.innerHTML = '<span class="fc-btn-text">Retry</span>';
        btn.disabled  = false;
      }
    }

    // ── Regenerate ────────────────────────────────────────────────────────────
    async function generateFlashcards() {
      if (!currentDocId) {
        triggerUpload();
        return;
      }

      const btn = $('gen-btn');
      btn.disabled  = true;
      btn.innerHTML = '<span class="fc-btn-text">Generating…</span>';
      $('fc-inner').classList.remove('flipped');
      showLoading();

      try {
        const newCards = await generateFromId(currentDocId, currentDocName);
        if (!newCards) return;

        cards   = newCards;
        cardIdx = 0;
        $('topbar-sub').textContent = `${currentDocName} — ${cards.length} cards`;
        saveSession();
        showDeck();
        resetGenBtn();

      } catch (err) {
        $('fc-loading').style.display = 'none';
        if (cards.length) showDeck(); else showUpload();
        alert('Error: ' + err.message);
        btn.innerHTML = '<span class="fc-btn-text">Retry</span>';
        btn.disabled  = false;
      }
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderCard() {
      $('fc-q').textContent    = cards[cardIdx].q;
      $('fc-a').textContent    = cards[cardIdx].a;
      $('fc-ctr').textContent  = (cardIdx + 1) + ' / ' + cards.length;
      $('fc-prog').style.width = (((cardIdx + 1) / cards.length) * 100) + '%';
      $('fc-inner').classList.remove('flipped');
      $('fc-prev').disabled    = cardIdx === 0;
      $('fc-next').disabled    = cardIdx === cards.length - 1;
      document.querySelectorAll('.fc-list-item').forEach((item, i) =>
        item.classList.toggle('current', i === cardIdx)
      );
      const active = document.querySelector('.fc-list-item.current');
      if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      try { localStorage.setItem(LS_IDX, String(cardIdx)); } catch { /* storage unavailable */ }
    }

    function renderCardList() {
      $('fc-list').innerHTML = cards.map((c, i) =>
        `<div class="fc-list-item ${i === cardIdx ? 'current' : ''}" onclick="jumpCard(${i})">
          <div class="fc-list-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="fc-list-q">${esc(c.q)}</div>
        </div>`
      ).join('');
    }

    // ── Controls ──────────────────────────────────────────────────────────────
    function flipCard()     { $('fc-inner').classList.toggle('flipped'); }
    function jumpCard(i)    { cardIdx = i; renderCard(); }
    function resetDeck()    { cardIdx = 0; renderCard(); }
    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      cardIdx = 0; renderCard(); renderCardList();
      saveSession();
    }

    $('fc-scene').addEventListener('click', flipCard);
    $('fc-prev').addEventListener('click', () => { if (cardIdx > 0)                { cardIdx--; renderCard(); } });
    $('fc-next').addEventListener('click', () => { if (cardIdx < cards.length - 1) { cardIdx++; renderCard(); } });
    document.addEventListener('keydown', e => {
      if (!cards.length) return;
      if      (e.key === 'ArrowRight') { if (cardIdx < cards.length - 1) { cardIdx++; renderCard(); } }
      else if (e.key === 'ArrowLeft')  { if (cardIdx > 0)                { cardIdx--; renderCard(); } }
      else if (e.key === ' ')          { e.preventDefault(); flipCard(); }
    });

    function esc(t) { const d = document.createElement('div'); d.textContent = String(t); return d.innerHTML; }

    // ── Boot: restore session or show upload ──────────────────────────────────
    if (restoreSession()) {
      showDeck();
    } else {
      showUpload();
    }
  </script>
</body>
</html>
